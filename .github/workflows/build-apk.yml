name: Build APK
on:
  push:
    branches: [main]
jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli@5
          npm install @capacitor/core@5 @capacitor/android@5
      - name: Prepare web folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp *.mp3 www/ 2>/dev/null || true
      - name: Init Capacitor
        run: npx cap init "Math Royale" "com.mathRoyale.app" --web-dir www
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: MathRoyale-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
