<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Math Royale — Offline</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0d1b2a,#1a2f45,#0d1b2a);
    min-height:100vh;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .logo{font-size:72px;margin-bottom:12px;animation:float 2s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  h1{font-size:28px;color:#f1c40f;text-shadow:0 0 16px #f1c40f;margin-bottom:8px;letter-spacing:2px;}
  p{font-size:14px;color:#bdc3c7;line-height:1.7;max-width:280px;margin-bottom:24px;}
  .retry-btn{
    padding:14px 36px;font-size:18px;font-weight:700;letter-spacing:2px;
    background:linear-gradient(90deg,#f1c40f,#e67e22);color:#1a1a2e;
    border:none;border-radius:50px;cursor:pointer;
    box-shadow:0 6px 0 #a57c00,0 0 24px rgba(241,196,15,0.4);
    transition:all 0.15s;
  }
  .retry-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a57c00;}
  .tip{font-size:11px;color:#7f8c8d;margin-top:20px;max-width:260px;line-height:1.6;}
</style>
</head>
<body>
  <div class="logo">⚔️</div>
  <h1>MATH ROYALE</h1>
  <p>Kamu sedang offline.<br>Sambungkan ke internet untuk bisa bermain multiplayer dan menyimpan progress.</p>
  <button class="retry-btn" onclick="location.reload()">🔄 COBA LAGI</button>
  <p class="tip">💡 Mode bot masih bisa dimainkan saat offline kalau kamu sudah pernah membuka game sebelumnya.</p>
</body>
</html>
